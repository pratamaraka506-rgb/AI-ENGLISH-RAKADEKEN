<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI English Learning Dashboard</title>
  <link rel="icon" type="image/jpeg" href="./ai-english-dashboard.jpeg" />
  <link rel="apple-touch-icon" href="./ai-english-dashboard.jpeg" />
  <meta name="description" content="AI English Learning Dashboard - Learn English With AI." />
  <meta name="theme-color" content="#1a3fd6" />
  <meta property="og:title" content="AI English Learning Dashboard" />
  <meta property="og:description" content="Learn English With AI Dashboard." />
  <meta property="og:image" content="./ai-english-dashboard.jpeg" />
  <meta property="og:type" content="website" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a3fd6;
      font-family: Arial, sans-serif;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      background: #1a3fd6;
    }
    .loading {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top right, #4f7dff 0%, #1a3fd6 45%, #0a1a66 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    .loading img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #c084fc;
      box-shadow: 0 0 30px rgba(192,132,252,0.5);
    }
    .loading h1 {
      font-size: 22px;
      color: #c084fc;
      text-align: center;
    }
    .loading p {
      font-size: 14px;
      color: #dbe6ff;
    }
    .loading.hide {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <img src="./ai-english-dashboard.jpeg" alt="AI English Learning Dashboard" />
    <h1>AI English Learning Dashboard</h1>
    <p>Loading dashboard...</p>
  </div>
  <iframe
    src="https://script.google.com/macros/s/AKfycbw2dsBe4KTD-ffbhck4DclI_LPo0kYUUV6qfDWrAiFYUJR41yOIs0kkwf1zrqn1Zpes/exec"
    title="AI English Learning Dashboard"
    onload="document.getElementById('loading').classList.add('hide')">
  </iframe>
</body>
</html>
